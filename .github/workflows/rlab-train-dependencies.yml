name: rlab train dependencies

on:
  workflow_call:
    inputs:
      source_sha:
        required: false
        type: string
    outputs:
      dependency_digest:
        value: ${{ jobs.dependencies.outputs.digest }}
      dependency_key:
        value: ${{ jobs.dependencies.outputs.dependency_key }}
      gpu_digest:
        value: ${{ jobs.gpu.outputs.digest }}
      gpu_key:
        value: ${{ jobs.metadata.outputs.gpu_key }}
      gpu_plan_sha256:
        value: ${{ jobs.metadata.outputs.gpu_plan_sha256 }}
      train_plan_sha256:
        value: ${{ jobs.metadata.outputs.train_plan_sha256 }}
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact pushed Git revision whose dependency contract should be prebuilt
        required: false
        type: string
  push:
    branches-ignore: [main]
    paths:
      - .github/workflows/rlab-train-dependencies.yml
      - containers/train/Dockerfile
      - containers/train/dependency_key.py
      - containers/train/dockerfile_inputs.py
      - containers/train/gpu-linux-amd64.lock
      - containers/train/gpu_key.py
      - containers/train/lock_projection.py
      - containers/train/train-linux-amd64.lock
      - pyproject.toml
      - uv.lock

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GPU_IMAGE_NAME: ${{ github.repository }}/rlab-train-gpu
  DEPENDENCY_IMAGE_NAME: ${{ github.repository }}/rlab-train-dependencies
  SOURCE_SHA: ${{ inputs.source_sha || github.sha }}

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      gpu_key: ${{ steps.meta.outputs.gpu_key }}
      gpu_plan_sha256: ${{ steps.meta.outputs.gpu_plan_sha256 }}
      train_plan_sha256: ${{ steps.meta.outputs.train_plan_sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: astral-sh/setup-uv@v7
      - name: Validate deterministic lock projections
        run: uv run --frozen --only-group train-image-build python containers/train/lock_projection.py --check
      - name: Resolve GPU inputs
        id: meta
        run: |
          {
            echo "gpu_key=$(python containers/train/gpu_key.py)"
            echo "gpu_plan_sha256=$(sha256sum containers/train/gpu-linux-amd64.lock | awk '{print $1}')"
            echo "train_plan_sha256=$(sha256sum containers/train/train-linux-amd64.lock | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

  gpu:
    needs: metadata
    runs-on: ubuntu-24.04
    concurrency:
      group: train-gpu-${{ needs.metadata.outputs.gpu_key }}
      cancel-in-progress: false
    outputs:
      digest: ${{ steps.result.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve immutable GPU image
        id: existing
        run: |
          image="${REGISTRY}/${GPU_IMAGE_NAME}:build-${{ needs.metadata.outputs.gpu_key }}"
          if metadata=$(docker buildx imagetools inspect "$image" 2>/dev/null); then
            echo "digest=$(awk '/^Digest:/ {print $2; exit}' <<<"$metadata")" >> "$GITHUB_OUTPUT"
          fi
      - name: Build GPU foundation
        id: build
        if: steps.existing.outputs.digest == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/train/Dockerfile
          target: gpu
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ env.REGISTRY }}/${{ env.GPU_IMAGE_NAME }}:build-${{ needs.metadata.outputs.gpu_key }}
          build-args: GPU_PLAN_SHA256=${{ needs.metadata.outputs.gpu_plan_sha256 }}
      - name: Select GPU digest
        id: result
        env:
          BUILT: ${{ steps.build.outputs.digest }}
          EXISTING: ${{ steps.existing.outputs.digest }}
        run: |
          digest="${BUILT:-${EXISTING:-}}"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  dependency-metadata:
    needs: [metadata, gpu]
    runs-on: ubuntu-24.04
    outputs:
      dependency_key: ${{ steps.meta.outputs.dependency_key }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - id: meta
        run: |
          key=$(python containers/train/dependency_key.py --gpu-digest '${{ needs.gpu.outputs.digest }}')
          echo "dependency_key=$key" >> "$GITHUB_OUTPUT"

  dependencies:
    needs: [metadata, gpu, dependency-metadata]
    runs-on: ubuntu-24.04
    concurrency:
      group: train-dependencies-${{ needs.dependency-metadata.outputs.dependency_key }}
      cancel-in-progress: false
    outputs:
      dependency_key: ${{ needs.dependency-metadata.outputs.dependency_key }}
      digest: ${{ steps.result.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve immutable dependency image
        id: existing
        run: |
          image="${REGISTRY}/${DEPENDENCY_IMAGE_NAME}:build-${{ needs.dependency-metadata.outputs.dependency_key }}"
          if metadata=$(docker buildx imagetools inspect "$image" 2>/dev/null); then
            echo "digest=$(awk '/^Digest:/ {print $2; exit}' <<<"$metadata")" >> "$GITHUB_OUTPUT"
          fi
      - name: Build train dependencies
        id: build
        if: steps.existing.outputs.digest == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/train/Dockerfile
          target: dependencies
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ env.REGISTRY }}/${{ env.DEPENDENCY_IMAGE_NAME }}:build-${{ needs.dependency-metadata.outputs.dependency_key }}
          build-args: |
            GPU_BASE=${{ env.REGISTRY }}/${{ env.GPU_IMAGE_NAME }}@${{ needs.gpu.outputs.digest }}
            GPU_IMAGE=${{ env.REGISTRY }}/${{ env.GPU_IMAGE_NAME }}
            GPU_IMAGE_DIGEST=${{ needs.gpu.outputs.digest }}
            TRAIN_PLAN_SHA256=${{ needs.metadata.outputs.train_plan_sha256 }}
      - name: Select dependency digest
        id: result
        env:
          BUILT: ${{ steps.build.outputs.digest }}
          EXISTING: ${{ steps.existing.outputs.digest }}
        run: |
          digest="${BUILT:-${EXISTING:-}}"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
