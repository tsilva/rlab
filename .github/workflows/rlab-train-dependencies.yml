name: rlab train dependencies

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact pushed Git revision whose dependency contract should be prebuilt
        required: false
        type: string
  push:
    branches-ignore: [main]
    paths:
      - .github/workflows/rlab-train-dependencies.yml
      - containers/train/Dockerfile
      - containers/train/dependency_key.py
      - containers/train/dockerfile_inputs.py
      - containers/train/environment_contract.py
      - containers/train/gpu-linux-amd64.lock
      - containers/train/gpu_key.py
      - containers/train/lock_projection.py
      - containers/train/train-dependencies-linux-amd64.lock
      - containers/train/train-linux-amd64.lock
      - pyproject.toml
      - uv.lock

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GPU_IMAGE_NAME: ${{ github.repository }}/rlab-train-gpu
  DEPENDENCY_IMAGE_NAME: ${{ github.repository }}/rlab-train-dependencies
  SOURCE_SHA: ${{ inputs.source_sha || github.sha }}

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      gpu_key: ${{ steps.meta.outputs.gpu_key }}
      gpu_plan_sha256: ${{ steps.meta.outputs.gpu_plan_sha256 }}
      train_plan_sha256: ${{ steps.meta.outputs.train_plan_sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: astral-sh/setup-uv@v7
      - name: Validate deterministic lock projections
        run: uv run --frozen --only-group train-image-build python containers/train/lock_projection.py --check
      - name: Resolve foundation inputs
        id: meta
        run: |
          {
            echo "gpu_key=$(python containers/train/gpu_key.py)"
            echo "gpu_plan_sha256=$(sha256sum containers/train/gpu-linux-amd64.lock | awk '{print $1}')"
            echo "train_plan_sha256=$(sha256sum containers/train/train-linux-amd64.lock | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

  publish:
    needs: metadata
    runs-on: ubuntu-24.04
    concurrency:
      group: train-foundations-${{ needs.metadata.outputs.gpu_key }}-${{ needs.metadata.outputs.train_plan_sha256 }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve immutable GPU image
        id: existing_gpu
        run: |
          image="${REGISTRY}/${GPU_IMAGE_NAME}:build-${{ needs.metadata.outputs.gpu_key }}"
          if metadata=$(docker buildx imagetools inspect "$image" 2>/dev/null); then
            echo "digest=$(awk '/^Digest:/ {print $2; exit}' <<<"$metadata")" >> "$GITHUB_OUTPUT"
          fi

      - name: Build GPU foundation
        id: build_gpu
        if: steps.existing_gpu.outputs.digest == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/train/Dockerfile
          target: gpu
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ env.REGISTRY }}/${{ env.GPU_IMAGE_NAME }}:build-${{ needs.metadata.outputs.gpu_key }}
          build-args: GPU_PLAN_SHA256=${{ needs.metadata.outputs.gpu_plan_sha256 }}

      - name: Select GPU digest
        id: gpu
        env:
          BUILT: ${{ steps.build_gpu.outputs.digest }}
          EXISTING: ${{ steps.existing_gpu.outputs.digest }}
        run: |
          digest="${BUILT:-${EXISTING:-}}"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Resolve dependency key
        id: dependency_meta
        run: |
          key=$(python containers/train/dependency_key.py --gpu-digest '${{ steps.gpu.outputs.digest }}')
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Resolve immutable dependency image
        id: existing_dependency
        run: |
          image="${REGISTRY}/${DEPENDENCY_IMAGE_NAME}:build-${{ steps.dependency_meta.outputs.key }}"
          if metadata=$(docker buildx imagetools inspect "$image" 2>/dev/null); then
            echo "digest=$(awk '/^Digest:/ {print $2; exit}' <<<"$metadata")" >> "$GITHUB_OUTPUT"
          fi

      - name: Build train dependencies
        id: build_dependency
        if: steps.existing_dependency.outputs.digest == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/train/Dockerfile
          target: dependencies
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ env.REGISTRY }}/${{ env.DEPENDENCY_IMAGE_NAME }}:build-${{ steps.dependency_meta.outputs.key }}
          build-args: |
            GPU_BASE=${{ env.REGISTRY }}/${{ env.GPU_IMAGE_NAME }}@${{ steps.gpu.outputs.digest }}
            GPU_IMAGE=${{ env.REGISTRY }}/${{ env.GPU_IMAGE_NAME }}
            GPU_IMAGE_DIGEST=${{ steps.gpu.outputs.digest }}
            TRAIN_PLAN_SHA256=${{ needs.metadata.outputs.train_plan_sha256 }}

      - name: Select dependency digest
        env:
          BUILT: ${{ steps.build_dependency.outputs.digest }}
          EXISTING: ${{ steps.existing_dependency.outputs.digest }}
        run: |
          digest="${BUILT:-${EXISTING:-}}"
          test -n "$digest"
          echo "Published dependency build-${{ steps.dependency_meta.outputs.key }} at $digest"
