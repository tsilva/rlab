name: rlab train image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .dockerignore
      - .github/workflows/rlab-train-image.yml
      - containers/train/**
      - experiments/machines.yaml
      - experiments/modal_eval.yaml
      - scripts/**
      - src/**
      - INSTANCES.md
      - METRICS.md
      - README.md
      - pyproject.toml
      - uv.lock
  pull_request:
    paths:
      - .dockerignore
      - .github/workflows/rlab-train-image.yml
      - containers/train/**
      - experiments/machines.yaml
      - experiments/modal_eval.yaml
      - scripts/**
      - src/**
      - INSTANCES.md
      - METRICS.md
      - README.md
      - pyproject.toml
      - uv.lock

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rlab-train
  DEPENDENCY_IMAGE_NAME: ${{ github.repository }}/rlab-train-dependencies

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      dependency_digest: ${{ steps.dependency_base.outputs.digest }}
      digest: ${{ steps.published_image.outputs.digest }}
      python_image: ${{ steps.build_meta.outputs.python_image }}
      runtime_image_ref: ${{ steps.published_image.outputs.runtime_image_ref }}
      train_config_contract_sha256: ${{ steps.runtime_contract.outputs.train_config_contract_sha256 }}
      uv_image: ${{ steps.build_meta.outputs.uv_image }}
      uv_lock_sha256: ${{ steps.build_meta.outputs.uv_lock_sha256 }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: build_meta
        run: |
          {
            echo "created=$(git show -s --format=%cI HEAD)"
            echo "uv_lock_sha256=$(sha256sum uv.lock | awk '{print $1}')"
            echo "dependency_key=$(python containers/train/dependency_key.py)"
            echo "python_image=$(awk -F= '/^ARG PYTHON_IMAGE=/ {print $2; exit}' containers/train/Dockerfile)"
            echo "uv_image=$(awk -F= '/^ARG UV_IMAGE=/ {print $2; exit}' containers/train/Dockerfile)"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve immutable dependency image
        id: existing_dependencies
        run: |
          set -euo pipefail
          image="${REGISTRY}/${DEPENDENCY_IMAGE_NAME}"
          tag="build-${{ steps.build_meta.outputs.dependency_key }}"
          if metadata=$(docker buildx imagetools inspect "${image}:${tag}" 2>/dev/null); then
            digest=$(awk '/^Digest:/ {print $2; exit}' <<<"$metadata")
            test -n "$digest"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "digest=$digest" >> "$GITHUB_OUTPUT"
            echo "Reusing immutable dependency image ${image}:${tag}@${digest}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dependency image
        id: build_dependencies
        if: github.event_name != 'pull_request' && steps.existing_dependencies.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/train/Dockerfile
          target: dependencies
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ env.REGISTRY }}/${{ env.DEPENDENCY_IMAGE_NAME }}:build-${{ steps.build_meta.outputs.dependency_key }}
          build-args: |
            UV_LOCK_SHA256=${{ steps.build_meta.outputs.uv_lock_sha256 }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.DEPENDENCY_IMAGE_NAME }}:buildcache
            type=gha
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.DEPENDENCY_IMAGE_NAME }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Resolve dependency base
        id: dependency_base
        env:
          BUILT_DIGEST: ${{ steps.build_dependencies.outputs.digest }}
          EXISTING_DIGEST: ${{ steps.existing_dependencies.outputs.digest }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          digest="${BUILT_DIGEST:-${EXISTING_DIGEST:-}}"
          if [[ -n "$digest" ]]; then
            echo "digest=$digest" >> "$GITHUB_OUTPUT"
            echo "runtime_base=${REGISTRY}/${DEPENDENCY_IMAGE_NAME}@${digest}" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "digest=unknown" >> "$GITHUB_OUTPUT"
            echo "runtime_base=dependencies" >> "$GITHUB_OUTPUT"
            echo "No published dependency image matches this pull request; using the internal stage"
          else
            echo "::error::No immutable dependency image is available"
            exit 1
          fi

      - name: Resolve immutable image
        id: existing_image
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          tag="git-${GITHUB_SHA}"
          if metadata=$(docker buildx imagetools inspect "${image}:${tag}" 2>/dev/null); then
            digest=$(awk '/^Digest:/ {print $2; exit}' <<<"$metadata")
            test -n "$digest"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "digest=$digest" >> "$GITHUB_OUTPUT"
            echo "Reusing immutable image ${image}:${tag}@${digest}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=git-${{ github.sha }}

      - name: Build image
        id: build
        if: github.event_name == 'pull_request' || steps.existing_image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/train/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: true
          sbom: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            RUNTIME_BASE=${{ steps.dependency_base.outputs.runtime_base }}
            BUILD_DATE=${{ steps.build_meta.outputs.created }}
            VCS_REF=${{ github.sha }}
            UV_LOCK_SHA256=${{ steps.build_meta.outputs.uv_lock_sha256 }}
            DEPENDENCY_IMAGE=${{ env.REGISTRY }}/${{ env.DEPENDENCY_IMAGE_NAME }}
            DEPENDENCY_IMAGE_DIGEST=${{ steps.dependency_base.outputs.digest }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.DEPENDENCY_IMAGE_NAME }}:buildcache

      - name: Resolve published digest
        id: published_image
        if: github.event_name != 'pull_request'
        env:
          BUILT_DIGEST: ${{ steps.build.outputs.digest }}
          EXISTING_DIGEST: ${{ steps.existing_image.outputs.digest }}
        run: |
          set -euo pipefail
          digest="${BUILT_DIGEST:-${EXISTING_DIGEST:-}}"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "runtime_image_ref=docker:${REGISTRY}/${IMAGE_NAME}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Prove runtime source and train-config contract
        id: runtime_contract
        if: github.event_name != 'pull_request'
        env:
          RUNTIME_IMAGE_REF: ${{ steps.published_image.outputs.runtime_image_ref }}
        run: |
          set -euo pipefail
          image="${RUNTIME_IMAGE_REF#docker:}"
          docker pull "$image"
          docker run --rm "$image" python -m rlab.runtime_contract > runtime-contract.json
          python - <<'PY'
          import json
          import os

          path = "runtime-contract.json"
          contract = json.load(open(path, encoding="utf-8"))
          if contract.get("source_sha") != os.environ["GITHUB_SHA"]:
              raise SystemExit(f"runtime source mismatch: {contract!r}")
          digest = str(contract.get("train_config_contract_sha256") or "")
          if len(digest) != 64:
              raise SystemExit(f"invalid train-config contract: {contract!r}")
          with open("runtime-preflight.json", "w", encoding="utf-8") as output:
              json.dump(
                  {
                      "batch_id": "bx0123456789abcdef",
                      "campaign_id": "release-smoke",
                      "game_family": "SuperMarioBros-Nes",
                      "goal_slug": "Level1-1",
                      "machine": "beast-3",
                      "queue_train_job_id": 1,
                      "recipe_path": "experiments/goals/SuperMarioBros-Nes-v0/Level1-1/recipes/base.yaml",
                      "recipe_slug": "base",
                      "retry_of_job_id": 0,
                      "run_description": "Release-time queue payload compatibility smoke.",
                      "run_name": "bx0123456789abcdef-base-s123-20000101T000000Z",
                      "runtime_image_ref": os.environ["RUNTIME_IMAGE_REF"],
                      "seed": 123,
                      "wandb_group": "bx0123456789abcdef",
                      "wandb_run_id": "rlab-release-smoke",
                      "wandb_tags": "goal_id:Level1-1,recipe_id:base",
                  },
                  output,
                  sort_keys=True,
              )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"train_config_contract_sha256={digest}\n")
          PY
          docker run --rm -i "$image" \
            python -m rlab.runtime_contract --validate-config-stdin \
            < runtime-preflight.json > runtime-preflight-receipt.json
          python - <<'PY'
          import json
          import os

          receipt = json.load(open("runtime-preflight-receipt.json", encoding="utf-8"))
          if receipt.get("source_sha") != os.environ["GITHUB_SHA"] or not receipt.get("validated"):
              raise SystemExit(f"runtime payload smoke failed: {receipt!r}")
          PY

  deploy-modal-evaluator:
    if: github.event_name != 'pull_request'
    needs: build
    uses: ./.github/workflows/rlab-modal-eval.yml
    with:
      runtime_image_ref: ${{ needs.build.outputs.runtime_image_ref }}
      source_sha: ${{ github.sha }}
      train_config_contract_sha256: ${{ needs.build.outputs.train_config_contract_sha256 }}
    secrets: inherit

  publish-runtime:
    if: github.event_name != 'pull_request'
    needs: [build, deploy-modal-evaluator]
    runs-on: ubuntu-24.04
    steps:
      - name: Write image digest artifact
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
          RUNTIME_IMAGE_REF: ${{ needs.build.outputs.runtime_image_ref }}
          SOURCE_SHA: ${{ github.sha }}
          TRAIN_CONFIG_CONTRACT_SHA256: ${{ needs.build.outputs.train_config_contract_sha256 }}
          MODAL_APP_NAME: ${{ needs.deploy-modal-evaluator.outputs.app_name }}
          MODAL_STARTUP_PROBE: ${{ needs.deploy-modal-evaluator.outputs.startup_probe }}
          UV_LOCK_SHA256: ${{ needs.build.outputs.uv_lock_sha256 }}
          PYTHON_IMAGE: ${{ needs.build.outputs.python_image }}
          UV_IMAGE: ${{ needs.build.outputs.uv_image }}
          DEPENDENCY_DIGEST: ${{ needs.build.outputs.dependency_digest }}
        run: |
          python - <<'PY'
          import json
          import os

          payload = {
              "schema_version": 2,
              "image": f"{os.environ['REGISTRY']}/{os.environ['IMAGE_NAME']}",
              "digest": os.environ["DIGEST"],
              "runtime_image_ref": os.environ["RUNTIME_IMAGE_REF"],
              "source_sha": os.environ["SOURCE_SHA"],
              "train_config_contract_sha256": os.environ["TRAIN_CONFIG_CONTRACT_SHA256"],
              "modal_app_name": os.environ["MODAL_APP_NAME"],
              "startup_probe": json.loads(os.environ["MODAL_STARTUP_PROBE"]),
              "tags": [f"git-{os.environ['SOURCE_SHA']}"],
              "uv_lock_sha256": os.environ["UV_LOCK_SHA256"],
              "base_images": {
                  "python": os.environ["PYTHON_IMAGE"],
                  "uv": os.environ["UV_IMAGE"],
                  "dependencies": (
                      f"docker:{os.environ['REGISTRY']}/{os.environ['DEPENDENCY_IMAGE_NAME']}"
                      f"@{os.environ['DEPENDENCY_DIGEST']}"
                  ),
              },
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          with open("rlab-train-image.json", "w", encoding="utf-8") as output:
              json.dump(payload, output, indent=2, sort_keys=True)
              output.write("\n")
          PY
          python -m json.tool rlab-train-image.json

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlab-train-image
          path: rlab-train-image.json
