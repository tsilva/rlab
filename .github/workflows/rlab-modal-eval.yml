name: rlab Modal eval deployment

on:
  workflow_call:
    inputs:
      runtime_image_ref:
        description: Immutable docker:ghcr.io/...@sha256:... train/eval runtime
        required: true
        type: string
      source_sha:
        description: Git source revision embedded in the runtime
        required: true
        type: string
    secrets:
      MODAL_TOKEN_ID:
        required: true
      MODAL_TOKEN_SECRET:
        required: true
      RLAB_MODAL_REGISTRY_SECRET_NAME:
        required: false
  workflow_dispatch:
    inputs:
      runtime_image_ref:
        description: Immutable docker:ghcr.io/...@sha256:... train/eval runtime
        required: true
        type: string
      source_sha:
        description: Git source revision embedded in the runtime
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.runtime_image_ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      app_name: ${{ steps.probe.outputs.app_name }}
      startup_probe: ${{ steps.probe.outputs.startup_probe }}
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      RLAB_MODAL_REGISTRY_SECRET: ${{ secrets.RLAB_MODAL_REGISTRY_SECRET_NAME }}
      RLAB_MODAL_EVAL_RUNTIME_IMAGE: ${{ inputs.runtime_image_ref }}
      RLAB_EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install locked deployment runtime
        run: uv sync --frozen --only-group modal-deploy --no-install-project
      - name: Validate immutable runtime ref
        run: |
          case "$RLAB_MODAL_EVAL_RUNTIME_IMAGE" in
            docker:*@sha256:*) ;;
            *) echo "runtime_image_ref must be an immutable docker digest ref" >&2; exit 2 ;;
          esac
      - name: Deploy immutable Modal evaluator
        run: uv run --no-sync modal deploy -m rlab.modal_app
      - name: Prove deployed worker image startup
        id: probe
        run: |
          uv run --no-sync python - <<'PY'
          import json
          import os

          import modal

          from rlab.modal_eval_config import load_modal_eval_config, modal_app_name

          runtime_image_ref = os.environ["RLAB_MODAL_EVAL_RUNTIME_IMAGE"]
          config = load_modal_eval_config()
          app_name = modal_app_name(config.app_name_prefix, runtime_image_ref)
          result = modal.Function.from_name(app_name, "startup_probe").remote()
          expected = {
              "app_name": app_name,
              "runtime_image_ref": runtime_image_ref,
              "source_sha": os.environ["RLAB_EXPECTED_SOURCE_SHA"],
          }
          if any(result.get(key) != value for key, value in expected.items()):
              raise SystemExit(f"unexpected Modal startup probe result: {result!r}")
          if int(result.get("schema_version") or 0) != 1:
              raise SystemExit(f"unexpected Modal startup probe schema: {result!r}")
          contract_sha = str(result.get("train_config_contract_sha256") or "")
          if len(contract_sha) != 64:
              raise SystemExit(f"unexpected Modal train-config contract: {result!r}")
          receipt = {
              "schema_version": 1,
              "source_sha": os.environ["RLAB_EXPECTED_SOURCE_SHA"],
              "runtime_image_ref": runtime_image_ref,
              "modal_app_name": app_name,
              "startup_probe": result,
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          with open("rlab-modal-eval-readiness.json", "w", encoding="utf-8") as output:
              json.dump(receipt, output, indent=2, sort_keys=True)
              output.write("\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"app_name={app_name}\n")
              output.write(
                  "startup_probe="
                  + json.dumps(result, sort_keys=True, separators=(",", ":"))
                  + "\n"
              )
          print(f"Modal startup probe passed for {app_name}")
          PY

      - name: Upload Modal readiness receipt
        uses: actions/upload-artifact@v4
        with:
          name: rlab-modal-eval-readiness
          path: rlab-modal-eval-readiness.json
