name: rlab Modal eval deployment

on:
  workflow_call:
    inputs:
      runtime_image_ref:
        description: Immutable docker:ghcr.io/...@sha256:... train/eval runtime
        required: true
        type: string
    secrets:
      MODAL_TOKEN_ID:
        required: true
      MODAL_TOKEN_SECRET:
        required: true
      RLAB_MODAL_REGISTRY_SECRET_NAME:
        required: true
  workflow_dispatch:
    inputs:
      runtime_image_ref:
        description: Immutable docker:ghcr.io/...@sha256:... train/eval runtime
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.runtime_image_ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      RLAB_MODAL_REGISTRY_SECRET: ${{ secrets.RLAB_MODAL_REGISTRY_SECRET_NAME }}
      RLAB_MODAL_EVAL_RUNTIME_IMAGE: ${{ inputs.runtime_image_ref }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install locked deployment runtime
        run: uv sync --frozen
      - name: Validate immutable runtime ref
        run: |
          case "$RLAB_MODAL_EVAL_RUNTIME_IMAGE" in
            docker:*@sha256:*) ;;
            *) echo "runtime_image_ref must be an immutable docker digest ref" >&2; exit 2 ;;
          esac
      - name: Deploy immutable Modal evaluator
        run: uv run modal deploy -m rlab.modal_app
      - name: Prove deployed worker image startup
        run: |
          uv run python - <<'PY'
          import os

          import modal

          from rlab.modal_eval_config import load_modal_eval_config, modal_app_name

          runtime_image_ref = os.environ["RLAB_MODAL_EVAL_RUNTIME_IMAGE"]
          config = load_modal_eval_config()
          app_name = modal_app_name(config.app_name_prefix, runtime_image_ref)
          result = modal.Function.from_name(app_name, "startup_probe").remote()
          expected = {
              "app_name": app_name,
              "runtime_image_ref": runtime_image_ref,
          }
          if result != expected:
              raise SystemExit(f"unexpected Modal startup probe result: {result!r}")
          print(f"Modal startup probe passed for {app_name}")
          PY
