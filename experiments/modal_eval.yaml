enabled: true
deployment:
  app_name_prefix: rlab-eval
  function_name: evaluate_checkpoint
cleanup:
  enabled: true
  interval_seconds: 3600
  grace_seconds: 86400
  max_stops_per_pass: 10
limits:
  hard_max_active: 20
  initial_effective_capacity: 3
  per_run_budget_usd: 5.0
  rolling_24h_budget_usd: 20.0
resources:
  cpu: 8.0
  memory_mib: 4096
  min_containers: 0
  buffer_containers: 0
  max_containers: 20
  single_use_containers: false
  scaledown_window_seconds: 60
  startup_timeout_seconds: 120
timeouts:
  screen_seconds: 900
  confirm_seconds: 1800
  promotion_seconds: 3600
  acceptance_seconds: 1200
  child_margin_seconds: 60
  expiry_margin_seconds: 900
cost:
  estimated_hourly_usd: 0.30
protocol:
  max_attempts: 2
preview:
  # Historical compatibility only; acceptance workers never capture previews.
  enabled: false
  max_frames: 450
  fps: 15
  max_lanes: 4
  scale: 2
  max_bytes: 2097152
  encode_timeout_seconds: 2
  upload_timeout_seconds: 3
