defaults:
- ../../_presets/mario-single-on-policy@_global_
- _self_
recipe_id: a2c
description: >-
  Seed {seed} trains an SB3 A2C {goal_id} baseline while preserving the goal's environment,
  reward, termination, stochastic evaluation, and checkpoint-promotion contracts.
train:
  backend:
    id: sb3.a2c
    config:
      n_steps: 64
      learning_rate: 7.0e-4
      max_grad_norm: 0.5
      use_rms_prop: true
      rms_prop_eps: 1.0e-5
