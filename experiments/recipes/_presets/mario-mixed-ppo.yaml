defaults:
- _self_
train:
  timesteps: 50000000
  backend:
    id: sb3.ppo
    config:
      n_steps: 512
      batch_size: 512
      n_epochs: 10
      learning_rate: 1.5e-4
      learning_rate_final: 1.0e-4
      learning_rate_schedule_timesteps: 4000000
      ent_coef: 0.01
      ent_coef_final: 1.0e-4
      ent_coef_schedule_timesteps: 4000000
      gamma: 0.9
      gae_lambda: 1.0
      clip_range: 0.15
      target_kl: 0.16
      vf_coef: 1.0
      adam_eps: 1.0e-08
      normalize_advantage: false
      advantage_normalization: per-task
      policy_net_arch: 512,512
      value_net_arch: 512,512
logging:
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: CHECKPOINT_BUCKET_URI
