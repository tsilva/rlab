defaults:
- _self_
train:
  timesteps: 100000000
  backend:
    id: sb3.ppo
    config:
      n_steps: 128
      batch_size: 256
      n_epochs: 4
      learning_rate: 2.5e-4
      ent_coef: 0.01
      gamma: 0.99
      gae_lambda: 0.95
      clip_range: 0.1
      vf_coef: 0.5
      adam_eps: 1.0e-05
      normalize_advantage: true
logging:
  wandb: true
  wandb_mode: online
