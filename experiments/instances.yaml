instances:
  rtx4090:
    aliases:
    - beast-3
    label: beast-3
    kind: fleet
    infra: docker/beast-3
    accelerator: RTX4090
    cpus: 12+
    memory: 48+
    image_id: ''
    expected_aggregate_wall_fps: null
    lower_contention_workers:
    - 3
    - 4
    notes:
    - Mac-side rlab fleet shepherd manages one train container per queued job on this host.
    - Use 6 train containers for screening queues.
    - Re-measure aggregate wall FPS for six containers; the older five-container expectation was about 6200.
    - Use 3-4 train containers when individual latency or lower contention matters.
  rtx2060:
    aliases:
    - beast-2
    label: beast-2
    kind: fleet
    infra: docker/beast-2
    accelerator: RTX2060
    cpus: 4+
    memory: 8+
    image_id: ''
    prebuilt_image: true
    fast_turnaround_workers: 2
    notes:
    - Mac-side rlab fleet shepherd manages one train container per queued job on this host.
    - Use ssh -o HostKeyAlias=beast-2 tsilva@192.168.133.26 until hostname resolution is restored.
    - The local-8332822-dirty image tag is a legacy k3s/containerd artifact; use pushed immutable GHCR digest refs for Docker fleet jobs.
  local-macbook:
    aliases:
    - macbook
    - local
    label: local MacBook
    kind: fleet
    infra: local_docker/local-macbook
    accelerator: CPU/MPS host
    notes:
    - Mac-side rlab fleet shepherd can run one queue-backed local Docker train container.
    - Best for smoke tests and queue/fleet debugging rather than long PPO batches.
