schema_version: 1
name: local-smoke-mario-l11
kind: local_smoke
description: Tiny local train/save/load/eval smoke on the imported Mario Level1-1 state.
goal_file: experiments/goals/SuperMarioBros-Nes-v0/Level1-1/_goal.yaml
recipe_file: experiments/recipes/mario/single/ppo.yaml
machine: local-macbook
recipe_overrides:
- recipe_id=benchmark-local-smoke
- campaign_id=benchmark-local-smoke
- description=Benchmark queue-backed localhost smoke run for Mario Level1-1.
- train.timesteps=512
- train.environment.env_config.n_envs=1
- train.backend.config.batch_size=128
- train.environment.task.termination.max_episode_steps=600
- train.checkpoint_freq=256
- logging.wandb=false
- logging.wandb_mode=disabled
- logging.wandb_artifact_storage_uri=''
expectations:
  train_exit_code: 0
  status_exit_code: 0
  result_json_exists: true
