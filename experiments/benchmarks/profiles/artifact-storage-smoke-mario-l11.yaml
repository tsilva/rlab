schema_version: 1
name: artifact-storage-smoke-mario-l11
kind: artifact_storage_smoke
description: Tiny checkpoint-producing W&B/R2 reference-artifact smoke on Mario Level1-1.
goal_file: experiments/goals/SuperMarioBros-Nes-v0/Level1-1/_goal.yaml
recipe_file: experiments/recipes/mario/single/ppo.yaml
recipe_overrides:
- train.environment.env_provider=stable-retro-turbo
- train.environment.env_config.env_args.use_fire_reset=false
- train.timesteps=512
- train.environment.env_config.n_envs=1
- train.backend.config.n_steps=128
- train.backend.config.batch_size=128
- train.backend.config.n_epochs=1
- train.environment.task.termination.max_episode_steps=600
- train.environment.task.reward.reward_mode=baseline
- train.checkpoint_freq=256
- train.post_train_eval_episodes=0
- logging.wandb=true
- logging.wandb_mode=online
- logging.wandb_artifact_storage_uri=CHECKPOINT_BUCKET_URI
run_name: benchmark_artifact_storage_smoke_mario_l11
run_description: Benchmark artifact-storage smoke run for Mario Level1-1.
expectations:
  exit_code: 0
  checkpoint_artifact_logged: true
  artifact_location_prefix: s3://
  metadata_sidecar_written: true
