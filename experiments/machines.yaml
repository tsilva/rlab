machines:
  beast-3:
    backend: docker_ssh
    prewarm_latest_runtime: true
    ssh_target: tsilva@beast-3
    docker:
      command:
      - sudo
      - -n
      - docker
    limits:
      max_parallel_containers: 6
    paths:
      host_root: /home/tsilva/rlab
  beast-2:
    backend: docker_ssh
    ssh_target: tsilva@192.168.133.26
    ssh_options:
    - -o
    - HostKeyAlias=beast-2
    docker:
      command:
      - sudo
      - -n
      - docker
    limits:
      max_parallel_containers: 4
    paths:
      host_root: /home/tsilva/rlab
  local-macbook:
    backend: local_docker
    docker:
      command:
      - docker
    limits:
      max_parallel_containers: 1
    paths:
      host_root: /Users/tsilva/repos/tsilva/rlab/runs/local-fleet
      roms_dir: /Users/tsilva/Desktop/roms
      env_file: /Users/tsilva/repos/tsilva/rlab/.env
