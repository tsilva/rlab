defaults:
- _self_
train:
  # Queue-backed training caps are explicit recipe inputs.
  timesteps: 50000000
  backend:
    config:
      # Both on-policy baselines consolidate at the same late learning rate.
      learning_rate_final: 1.0e-4
      learning_rate_schedule_timesteps: 4000000
      # Explore early, then taper entropy pressure over the learning-rate horizon.
      ent_coef: 0.01
      ent_coef_final: 1.0e-4
      ent_coef_schedule_timesteps: 4000000
      # Preserve the Level1-1 discount, GAE horizon, and shaped-reward weighting.
      gamma: 0.9
      gae_lambda: 1.0
      vf_coef: 1.0
      # Preserve raw advantage magnitude across the on-policy baselines.
      normalize_advantage: false
logging:
  # Queue-backed logging choices are explicit recipe inputs, not runtime defaults.
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: CHECKPOINT_BUCKET_URI
