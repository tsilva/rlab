# Hydra composition list; imports the shared Mario goal contract first.
defaults:
# Shared Mario goal contract supplies the environment contract and early-stop/eval defaults.
- ../_goal-common@_global_
# Apply this file after the shared contract; goal-specific overrides can live here when needed.
- _self_

# End attempts that make no new horizontal progress for roughly 20 seconds.
train:
  environment:
    task:
      events:
        stalled: {signal: x, operation: unchanged_for, steps: 300}
      termination:
        failure: [life_loss, stalled]

# Track no-progress events during checkpoint evaluation without treating them as
# terminal failures; eval continues until level completion or the episode cap.
eval:
  environment:
    task:
      events:
        stalled: {signal: x, operation: unchanged_for, steps: 300}
      termination:
        failure: []
