defaults:
- base@_global_
- _self_
spec_id: no-terminal
template_vars:
  variant: no-terminal
  rollout: continuous-rollout
description: >-
  Seed {seed} trains the {goal_id} low-KL recipe without life-loss or level-change terminal
  boundaries, created to test whether longer continuous rollouts help while preserving the
  baseline PPO and reward-shaping settings.
tags:
- "goal_id:{goal_id}"
- "spec_id:{spec_id}"
- "env_id:{env_id}"
train:
  environment:
    env_config:
      # Empty list overrides the goal default of [life_loss, level_change].
      done_on: []
eval:
  environment:
    env_config:
      # Keep eval aligned with the no-terminal training environment.
      done_on: []
