defaults:
- _self_
recipe_id: jerk
description: >-
  Seed {seed} searches deterministic {goal_id} attempts with vectorized Just Enough Retained
  Knowledge, accepting and publishing the first open-loop action sequence that completes the
  level; exhausting the transition budget without a completion is unsuccessful.
train:
  timesteps: 10000000
  backend:
    id: rlab.jerk
    config:
      acceptance_mode: first_training_success
      archive_replay_probability_initial: 0.25
      archive_replay_probability_max: 0.9
      protected_prefix_steps: 128
      max_prefix_shorten_steps: 128
      retained_limit: 256
      fallback_action: noop
      log_interval_steps: 10000
logging:
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: CHECKPOINT_BUCKET_URI
