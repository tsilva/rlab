defaults:
- ../_common@_global_
- _self_
recipe_id: ppo
description: >-
  Seed {seed} trains the stable low-KL late-decay {goal_id} PPO policy-search baseline,
  created to validate the recipe across seeds with the goal contract's clear-rate gate
  first and async checkpoint eval ranking for checkpoint promotion.
train:
  backend:
    id: sb3.ppo
    config:
      # Uses moderately long PPO rollouts so each update sees enough complete/death attempts to learn stable progress.
      n_steps: 512
      # Matches the rollout chunk size, giving full-batch PPO updates that reduce minibatch noise for this single-task recipe.
      batch_size: 512
      # Reuses each rollout enough to extract signal from sparse clears without pushing the policy as aggressively as a higher-KL setup.
      n_epochs: 10
      # Starts conservatively so PPO can move quickly early without destabilizing the sensitive Mario policy.
      learning_rate: 1.5e-4
      # Tightens PPO clipping to limit destructive policy jumps while still allowing meaningful improvement from good rollouts.
      clip_range: 0.15
      # Stops overly large PPO updates before they erase useful behavior; this is the low-KL guardrail.
      target_kl: 0.16
      # Keeps Adam's numerical stabilizer at the standard small value.
      adam_eps: 1.0e-08
