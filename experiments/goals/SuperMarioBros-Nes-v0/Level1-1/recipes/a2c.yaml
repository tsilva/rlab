defaults:
- ../_common@_global_
- _self_
recipe_id: a2c
description: >-
  Seed {seed} trains an SB3 A2C {goal_id} baseline while preserving the goal's
  environment, reward, termination, stochastic evaluation, and checkpoint-promotion
  contracts, using an A2C-native rollout and optimizer configuration.
train:
  backend:
    id: sb3.a2c
    config:
      # A2C performs one update per rollout, so collect a smaller batch than the PPO baseline.
      n_steps: 64
      # Start from SB3's A2C-scale learning rate, then consolidate at the PPO baseline's late rate.
      learning_rate: 7.0e-4
      # Use the standard A2C gradient guard and RMSprop optimizer settings.
      max_grad_norm: 0.5
      use_rms_prop: true
      rms_prop_eps: 1.0e-5
