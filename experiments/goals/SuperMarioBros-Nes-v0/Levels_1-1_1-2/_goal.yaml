defaults:
- _self_
goal_id: "{goal_id}"
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
- mario
- level1-1
- level1-2
- mixed-state
title: Sample-efficient SuperMarioBros-NES Levels 1-1 and 1-2 completion
objective:
  states:
  - Level1-1
  - Level1-2
  rank:
  - max(eval/full/outcome/success/rate/min)
  - max(eval/full/outcome/success/rate/mean)
  - min(leader/checkpoint/steps_to_goal)
  - max(eval/full/episode/return/mean)
train:
  # Run queue-backed checkpoint evaluation outside the training machine on Modal.
  checkpoint_eval_backend: modal
  checkpoint_freq: 250000
  stop_on_acceptance: true
  environment:
    env_provider: &mario_env_provider supermariobrosnes-turbo
    env_config:
      <<: &mario_env_config
        game: SuperMarioBros-Nes-v0
        n_envs: 16
        env_args:
          # Keep provider action-set conveniences disabled; rlab owns the task codec.
          action_set: null
          scenario: scenario
          info: data
          # rlab owns the goal-level discrete codec and sends native button masks.
          use_restricted_actions: all
          record: false
          players: 1
          inttype: stable
          obs_type: image
          render_mode: rgb_array
          num_threads: 16
          rom_path: null
          obs_copy: safe_view
          obs_grayscale: true
          obs_layout: chw
          frame_stack: 4
          noop_reset_max: 0
          reward_clip: false
          info_filter: all
        states:
        - Level1-1
        - Level1-2
        state_probs:
        - 0.5
        - 0.5
        frame_skip: 4
        max_pool_frames: false
        sticky_action_prob: 0.0
        observation_size: 84
        obs_crop:
        - 32
        - 0
        - 0
        - 0
        obs_crop_mode: mask
        obs_crop_fill: 0
        obs_resize_algorithm: area
    task: &mario_task
      id: mario
      action:
        set: simple
      signals:
        x: [xscrollHi, xscrollLo]
        score: score
        lives: lives
        level: [levelHi, levelLo]
      events:
        life_loss: {signal: lives, operation: decrease}
        level_change: {signal: level, operation: change}
      termination:
        failure: [life_loss]
        success: [level_change]
        max_episode_steps: 4500
      reward:
        reward_mode: score
        use_native_reward: false
        clip_rewards: false
        progress_reward_cap: 30.0
        progress_reward_scale: 1.0
        terminal_reward: 50.0
        reward_scale: 10.0
        time_penalty: 0.0
        death_penalty: 25.0
        completion_reward: 0.0
        score_progress_clipped: false
      conditioning:
        enabled: true
        signal: level
        values:
        - [0, 0]
        - [0, 1]
eval:
  episodes: 100
  acceptance:
  - metric: eval/full/outcome/success/rate/min
    operator: '>='
    threshold: 1.0
  environment:
    env_provider: *mario_env_provider
    env_config:
      <<: *mario_env_config
      # Promotion eval remains vectorized; the lane count is part of its reproducible protocol.
      n_envs: 16
    task:
      <<: *mario_task
      termination:
        failure: []
        success: [level_change]
        max_episode_steps: 4500
release:
  # Marker-only. rlab derives the repository identity and owns the release file contract.
  huggingface: {}
