defaults:
- _self_
goal_id: "{goal_id}"
group_id: Levels_1-1_1-2
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
- mario
- level1-1
- level1-2
- mixed-state
title: Sample-efficient SuperMarioBros-NES Levels 1-1 and 1-2 completion
objective:
  states:
  - Level1-1
  - Level1-2
  rank:
  - max(eval/info/level_complete/rate/min)
  - max(eval/info/level_complete/rate/mean)
  - min(leader/checkpoint/steps_to_completion_goal)
  - max(eval/reward/mean)
train:
  checkpoint_freq: 500000
  early_stop:
  - metric: checkpoint_eval/candidate/pass
    operator: '>='
    threshold: 1.0
  checkpoint_eval_stages:
  - name: screen
    episodes: 10
    n_envs: 2
    pass:
    - metric: eval/info/level_complete/rate/min
      operator: '>='
      threshold: 1.0
  - name: confirm
    episodes: 30
    n_envs: 4
    pass:
    - metric: eval/info/level_complete/rate/min
      operator: '>='
      threshold: 1.0
    candidate_stop: true
  environment:
    env_provider: &mario_env_provider supermariobrosnes-turbo
    env_config:
      <<: &mario_env_config
        game: SuperMarioBros-Nes-v0
        n_envs: 16
        states:
        - Level1-1
        - Level1-2
        state_probs:
        - 0.5
        - 0.5
        frame_skip: 4
        max_pool_frames: false
        sticky_action_prob: 0.0
        observation_size: 84
        obs_crop:
        - 32
        - 0
        - 0
        - 0
        obs_resize_algorithm: area
    task: &mario_task
      id: mario
      action:
        set: simple
      signals:
        x: [xscrollHi, xscrollLo]
        score: score
        lives: lives
        level: [levelHi, levelLo]
      events:
        life_loss: {signal: lives, operation: decrease}
        level_change: {signal: level, operation: change}
      termination:
        failure: [life_loss]
        success: [level_change]
        max_episode_steps: 4500
      reward:
        reward_mode: score
        use_native_reward: false
        clip_rewards: false
        progress_reward_cap: 30.0
        progress_reward_scale: 1.0
        terminal_reward: 50.0
        reward_scale: 10.0
        time_penalty: 0.0
        death_penalty: 25.0
        completion_reward: 0.0
        score_progress_clipped: false
      conditioning:
        enabled: true
        signal: level
        values:
        - [0, 0]
        - [0, 1]
eval:
  episodes: 100
  environment:
    env_provider: *mario_env_provider
    env_config:
      <<: *mario_env_config
    task:
      <<: *mario_task
      termination:
        failure: []
        success: [level_change]
        max_episode_steps: 4500
release:
  huggingface:
    repo: "{env_id}_{goal_id}"
    card_template: stable-retro-sb3
    checkpoint_filename: model.zip
    preview_filename: replay.mp4
    include_youtube_preview: true
