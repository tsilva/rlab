defaults:
- level2-heavy@_global_
- _self_
recipe_id: level2-heavy-conservative
template_vars:
  env_id: SuperMarioBros-Nes-v0
description: >-
  Seed {seed} trains the task-conditioned {goal_id} 35/65 Level1-2-heavy
  sampling recipe with a more conservative PPO update envelope, testing whether
  lower learning rate, clip range, and target KL preserve the early Level1-2
  discovery while reducing late rolling-window regressions.
train:
  policy:
    learning_rate: 1.0e-4
    learning_rate_final: 7.0e-5
    clip_range: 0.1
    target_kl: 0.08
