defaults:
- ../_goal@goal
- _self_
recipe_id: base
template_vars:
  recipe: task-conditioned-lowkl
  schedule: lrdecay
description: >-
  Seed {seed} trains a task-conditioned {goal_id} policy over Level1-1 and Level1-2
  with 50/50 weighted starts, per-task advantage normalization, and the goal
  contract's bottleneck clear-rate gate before out-of-process eval ranking.
train:
  policy:
    timesteps: 5000000
    torch_num_threads: 1
    n_steps: 512
    batch_size: 512
    n_epochs: 10
    learning_rate: 1.5e-4
    learning_rate_final: 1.0e-4
    learning_rate_schedule_timesteps: 4000000
    ent_coef: 0.01
    ent_coef_final: 1.0e-4
    ent_coef_schedule_timesteps: 4000000
    gamma: 0.9
    gae_lambda: 1.0
    clip_range: 0.15
    target_kl: 0.16
    vf_coef: 1.0
    adam_eps: 1.0e-08
    normalize_advantage: false
    advantage_normalization: per-task
    policy_net_arch: 512,512
    value_net_arch: 512,512
logging:
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: CHECKPOINT_BUCKET_URI
