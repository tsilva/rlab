defaults:
- level2-medium@_global_
- _self_
recipe_id: b93-slowent-l12bias
template_vars:
  env_id: SuperMarioBros-Nes-v0
  recipe: historical-b93
  schedule: slowent
  variant: l12bias
description: >-
  Seed {seed} reproduces the historical B93/B116 Level1-1/Level1-2 mixed PPO
  settings: 40/60 Level1-1/Level1-2 sampling, slow entropy decay with a higher
  entropy floor, constant learning rate, target_kl=0.20, clip_range=0.15,
  smaller policy head, clipped score progress, and no completion reward. Judge
  this discovery run by peak train/info/level_complete/rate/min/last within
  the 5M-step historical cap before deciding whether to extend or confirm.
train:
  policy:
    timesteps: 5000000
    learning_rate: 1.5e-4
    learning_rate_final: 1.5e-4
    learning_rate_schedule_timesteps: 1
    ent_coef: 0.01
    ent_coef_final: 0.001
    ent_coef_schedule_timesteps: 4000000
    clip_range: 0.15
    clip_range_vf: 0.2
    target_kl: 0.2
    vf_coef: 0.5
    policy_net_arch: 64,64
    value_net_arch: 512,512
  environment:
    env_config:
      action_set: simple
      max_episode_steps: 4500
      task_conditioning_info_values:
      - [0, 0]
      - [0, 1]
      - [0, 2]
      env_wrappers:
      - id: SuperMarioBrosNesProgressInfoWrapper
      - id: SuperMarioBrosNesRewardEnvWrapper
        kwargs:
          reward_mode: score
          progress_reward_scale: 1.0
          terminal_reward: 50
          death_penalty: 25
          completion_reward: 0.0
          reward_scale: 10
          score_progress_clipped: true
