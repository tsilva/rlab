defaults:
- b93-slowent-l12bias@_global_
- _self_
recipe_id: b93-lrdecay-retain
template_vars:
  env_id: SuperMarioBros-Nes-v0
description: >-
  Seed {seed} keeps the historical B93/B116 mixed Level1-1/Level1-2 reward,
  40/60 sampling, entropy schedule, PPO clip/target-KL envelope, and network
  shape, but decays learning rate after the discovery phase. The hypothesis is
  that the original B93 settings can discover both levels, while late constant
  1.5e-4 updates are large enough to knock one rolling clear-rate window below
  the other before the shared policy reaches the 100/100 gate.
train:
  policy:
    timesteps: 50000000
    learning_rate: 1.5e-4
    learning_rate_final: 7.5e-5
    learning_rate_schedule_timesteps: 10000000
