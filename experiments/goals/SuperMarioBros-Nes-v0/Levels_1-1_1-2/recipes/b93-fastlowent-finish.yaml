defaults:
- b93-slowent-l12bias@_global_
- _self_
recipe_id: b93-fastlowent-finish
template_vars:
  env_id: SuperMarioBros-Nes-v0
  recipe: historical-b93
  schedule: b93-discovery-lower-floor
  variant: l12bias-fastlowent-finish
description: >-
  Seed {seed} keeps the historical B93/B116 mixed Level1-1/Level1-2 discovery
  schedule length but lowers the final entropy floor. The hypothesis is that
  B93 already discovers both tasks quickly, while the shared policy needs less
  late stochasticity for a stable 100-attempt bottleneck window. Unlike
  b93-lowent-finish, this does not stretch entropy decay to 6M steps, so early
  exploration pressure stays aligned with the historical winner.
train:
  policy:
    timesteps: 50000000
    ent_coef_final: 3.0e-4
    ent_coef_schedule_timesteps: 4000000
