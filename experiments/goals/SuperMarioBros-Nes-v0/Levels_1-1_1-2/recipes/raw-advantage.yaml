defaults:
- base@_global_
- _self_
recipe_id: raw-advantage
description: >-
  Seed {seed} trains the task-conditioned {goal_id} baseline with raw PPO
  advantages instead of per-task advantage normalization, testing whether the
  shared Level1-1/Level1-2 policy benefits from preserving the reward-scale
  signal that solved the single-level recipes while leaving the environment
  contract unchanged.
train:
  backend:
    id: sb3.ppo
    config:
      advantage_normalization: none
      normalize_advantage: false
