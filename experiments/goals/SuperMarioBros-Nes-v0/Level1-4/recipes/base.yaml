defaults:
- ../../Level1-1/recipes/base@_global_
- ../_goal@goal
- _self_
recipe_id: base
batch_id: b257
template_vars:
  recipe_label: B257 soft-update no-bonus
description: >-
  Seed {seed} trains the {goal_id} {recipe_label} recipe, created from the
  historical Level1-4 screen winner to keep the score/progress reward contract while
  lowering PPO update pressure for more stable World 1-4 clears.
train:
  policy:
    learning_rate: 1.2e-4
    learning_rate_final: 8.0e-5
    clip_range: 0.12
    target_kl: 0.10
