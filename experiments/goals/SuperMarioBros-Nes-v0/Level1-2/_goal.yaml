# Hydra composition list; imports the shared Mario goal contract first.
defaults:
# Shared Mario base; composes the reusable env and supplies early-stop/eval defaults.
- ../_base@_global_
# Apply this file after the base; lets Level1-2 define its own state, evidence, and defaults.
- _self_
# Goal id is rendered from the goal directory name.
goal_id: "{goal_id}"
# Human-readable title; helps reports and operators identify the goal quickly.
title: Sample-efficient SuperMarioBros-NES {goal_id} completion
# Goal-specific train environment overlay; only the source state differs from the shared Mario env.
train:
  environment:
    # Stable Retro state id; this single-state goal uses the goal id as the source state.
    env_config:
      state: "{state}"
