# Hydra composition list; imports the reusable Mario environment contract first.
defaults:
# Shared SuperMarioBros-NES Turbo EnvConfig for training; goal overlays set the source state(s).
- ../../envs/supermariobrosnes-turbo/SuperMarioBros-Nes-v0@train.environment
# Same EnvConfig composed into eval, with eval-only overrides below.
- ../../envs/supermariobrosnes-turbo/SuperMarioBros-Nes-v0@eval.environment
# Apply this file after the env so goal-owned defaults can override env details deliberately.
- _self_
# Objective defines candidate comparison order.
objective:
  # Ordered ranking signals; compare each metric in sequence until a candidate wins.
  rank:
  - max(eval/done/level_change/from_rate/min)
  - max(eval/done/level_change/from_rate/mean)
  - min(leader/checkpoint/steps_to_completion_goal)
  - max(eval/reward/mean)
# Training contract for this goal. The composed env supplies train.environment.
train:
  # Shared checkpoint cadence for Mario training jobs.
  checkpoint_freq: 500000
  # The metric itself owns the 100-attempt FIFO semantics.
  early_stop:
  - metric: train/info/level_complete/rate/min/last
    operator: '>'
    # >0.99 means the latest FIFO window is effectively full.
    threshold: 0.99
  environment:
    env_config:
      # Training attempts terminate on death or level clear.
      done_on:
      - life_loss
      - level_change
# Goal-owned checkpoint eval protocol.
eval:
  # Eval-time environment config; composed from the same reusable EnvConfig as training.
  environment:
    env_config:
      max_episodes: 100
      # Eval episodes stop on observed level changes, not life loss.
      done_on:
      - level_change
# Goal-level release target; winner identity is resolved from `rlab leaders checkpoints`.
release:
  huggingface:
    repo: SuperMarioBros-NES_{goal_id}
    card_template: stable-retro-sb3
    checkpoint_filename: ppo_{game_slug}_{checkpoint_step}_steps.zip
    preview_filename: replay.mp4
    include_youtube_preview: true
