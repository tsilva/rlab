defaults:
- _self_
# Goal id is rendered from the goal directory name.
goal_id: "{goal_id}"
# SuperMario single-state goals intentionally map the source state from goal identity.
template_vars:
  state: "{goal_id}"
# Default reusable group identifier for all Super Mario recipes under this goal tree.
group_id: "{goal_id}"
# Default queue run name; seed and timestamp are filled when jobs are enqueued.
run_name_template: "{group_id}_{recipe_id}_s{seed}_{timestamp}"
# Default W&B tags for queue-backed recipes under this goal tree.
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
# Human-readable title; helps reports and operators identify the goal quickly.
title: Sample-efficient SuperMarioBros-NES {goal_id} completion
# Objective defines candidate comparison order.
objective:
  # Ordered ranking signals; compare each metric in sequence until a candidate wins.
  rank:
  - max(eval/done/level_change/from_rate/min)
  - max(eval/done/level_change/from_rate/mean)
  - min(leader/checkpoint/steps_to_completion_goal)
  - max(eval/reward/mean)
# Training contract for this goal.
train:
  # Shared checkpoint cadence for Mario training jobs.
  checkpoint_freq: 500000
  # The metric itself owns the 100-attempt FIFO semantics.
  early_stop:
  - metric: checkpoint_eval/candidate/pass
    operator: '>='
    threshold: 1.0
  checkpoint_eval_stages:
  - name: screen
    episodes: 10
    n_envs: 2
    pass:
    - metric: eval/done/level_change/from_rate/min
      operator: '>='
      threshold: 1.0
  - name: confirm
    episodes: 30
    n_envs: 4
    pass:
    - metric: eval/done/level_change/from_rate/min
      operator: '>='
      threshold: 1.0
    candidate_stop: true
  environment:
    # SuperMarioBros-NES Turbo supplies SuperMarioBrosNesTurboVecEnv.
    env_provider: &mario_env_provider supermariobrosnes-turbo
    env_config:
      <<: &mario_env_config
        # Stable Retro-compatible game id passed to SuperMarioBrosNesTurboVecEnv.
        game: SuperMarioBros-Nes-v0
        n_envs: 16
        # Emulator frame skip; fixes action repeat and observation cadence.
        frame_skip: 4
        # Whether to max-pool adjacent frames; false matches the current native-vector Mario contract.
        max_pool_frames: false
        # Random sticky action probability; 0 disables stochastic action repetition for this contract.
        sticky_action_prob: 0.0
        # Square resize target for native preprocessing.
        observation_size: 84
        # Crop the HUD from the top of the frame before resize as [top, right, bottom, left].
        obs_crop:
        - 32
        - 0
        - 0
        - 0
        # Keep full source geometry and hide the HUD region before resize.
        obs_crop_mode: mask
        obs_crop_fill: 0
        # Resize kernel; area downsampling is the expected image resizer for this contract.
        obs_resize_algorithm: area
      # Stable Retro state id; single-state Mario goals use the goal id as the source state.
      state: "{state}"
    task: &mario_task
      id: mario
      action:
        set: simple
      signals:
        x: [xscrollHi, xscrollLo]
        score: score
        lives: lives
        level: [levelHi, levelLo]
      events:
        life_loss: {signal: lives, operation: decrease}
        level_change: {signal: level, operation: change}
      termination:
        failure: [life_loss]
        success: [level_change]
        max_episode_steps: 4500
      reward:
        reward_mode: score
        use_retro_reward: false
        clip_rewards: false
        progress_reward_cap: 30.0
        progress_reward_scale: 1.0
        terminal_reward: 50.0
        reward_scale: 10.0
        time_penalty: 0.0
        death_penalty: 25.0
        completion_reward: 0.0
        score_progress_clipped: false
# Goal-owned checkpoint eval protocol.
eval:
  episodes: 100
  environment:
    # SuperMarioBros-NES Turbo supplies SuperMarioBrosNesTurboVecEnv.
    env_provider: *mario_env_provider
    env_config:
      <<: *mario_env_config
    task:
      <<: *mario_task
      # Eval episodes stop on observed level changes, not life loss.
      termination:
        failure: []
        success: [level_change]
        max_episode_steps: 4500
# Goal-level release target; winner identity is resolved from `rlab leaders checkpoints`.
release:
  huggingface:
    repo: "{env_id}_{goal_id}"
    card_template: stable-retro-sb3
    checkpoint_filename: model.zip
    preview_filename: replay.mp4
    include_youtube_preview: true
