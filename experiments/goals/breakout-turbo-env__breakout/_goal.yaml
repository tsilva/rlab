defaults:
- _self_
goal_id: breakout-turbo-env__breakout
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
title: Native Atari Breakout replica PPO training
objective:
  rank:
  - min(eval/full/outcome/reason/serve_stall/rate)
  - max(eval/full/episode/return/mean)
  - max(eval/full/episode/return/best)
  - min(leader/checkpoint/step)
train:
  # Training-only: run to the recipe timestep cap without checkpoint or final evaluation.
  # Periodic checkpoints remain available for later manual use.
  checkpoint_eval_backend: none
  stop_on_acceptance: false
  checkpoint_freq: 500000
  environment:
    env_provider: &breakout_provider breakout-turbo-env
    env_config:
      <<: &breakout_env_config
        game: BreakoutTurbo-v0
        state: full
        n_envs: 16
        env_args: &breakout_provider_args
          num_threads: 6
          frame_stack: 4
          obs_layout: chw
          obs_grayscale: true
          obs_copy: safe_view
          info_filter: all
          render_mode: rgb_array
    preprocessing: &breakout_preprocessing
      frame_skip: 4
      max_pool_frames: false
      sticky_action_prob: 0.0
      observation_size: 84
      # Match the Atari goal: mask the score band while preserving the wall.
      obs_crop: [17, 0, 0, 0]
      obs_crop_mode: mask
      obs_crop_fill: 0
      obs_resize_algorithm: area
    task: &breakout_task
      id: identity
      action:
        set: native
      signals:
        awaiting_fire: awaiting_fire
      events:
        serve_stall:
          signal: awaiting_fire
          operation: equals_for
          value: 1
          # One policy step is four native frames; 256 steps is ~17 seconds.
          steps: 256
      termination:
        failure: [serve_stall]
        max_episode_steps: 54000
      reward:
        reward_mode: native
eval:
  # Dormant policy/playback contract only. checkpoint_eval_backend=none prevents execution.
  episodes: 100
  policy:
    stochastic: true
  environment:
    env_provider: *breakout_provider
    env_config:
      <<: *breakout_env_config
      n_envs: 16
      env_args:
        <<: *breakout_provider_args
    preprocessing: *breakout_preprocessing
    task: *breakout_task
