defaults:
- _self_
goal_id: alepy__breakout
group_id: "{goal_id}"
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
title: Baseline stable-retro Atari Breakout PPO training
objective:
  rank:
  - max(eval/reward/mean)
  - max(eval/best/reward)
  - min(leader/checkpoint/steps_to_completion_goal)
train:
  checkpoint_freq: 500000
  environment:
    env_provider: &atari_env_provider stable-retro-turbo
    env_config:
      <<: &atari_breakout_env_config
        game: Breakout-Atari2600-v0
        state: Start
        n_envs: 16
        env_args:
          num_threads: 4
          reward_clip: true
    preprocessing:
      frame_skip: 4
      max_pool_frames: true
      sticky_action_prob: 0.25
      observation_size: 84
      # Breakout's score ends at source row 14; the top wall starts at row 17.
      # Mask the score band and separator while preserving the full wall.
      obs_crop:
      - 17
      - 0
      - 0
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: &identity_task
      id: identity
      action:
        set: breakout_minimal
        codec:
          type: discrete_lookup
          # Stable Retro Atari order: BUTTON, unused, SELECT, RESET,
          # UP, DOWN, LEFT, RIGHT. Keep FIRE held so the executed action always
          # matches the policy choice while launches happen automatically.
          values:
          - [1, 0, 0, 0, 0, 0, 0, 0] # FIRE / stationary
          - [1, 0, 0, 0, 0, 0, 1, 0] # FIRE + LEFT
          - [1, 0, 0, 0, 0, 0, 0, 1] # FIRE + RIGHT
      signals: {}
      events: {}
      # Preserve the previous 216,000 raw-frame cap at frame_skip=4.
      termination:
        max_episode_steps: 54000
      reward:
        reward_mode: native
eval:
  episodes: 100
  policy:
    stochastic: true
  environment:
    env_provider: *atari_env_provider
    env_config:
      <<: *atari_breakout_env_config
      # Train on clipped rewards, but rank checkpoints by the real game score.
      env_args:
        num_threads: 4
        reward_clip: false
    preprocessing:
      # Keep the top wall (it begins at source row 17) while removing the score.
      obs_crop:
      - 17
      - 0
      - 0
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: *identity_task
