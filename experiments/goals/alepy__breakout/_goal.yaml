defaults:
- _self_
goal_id: alepy__breakout
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
title: Baseline stable-retro Atari Breakout PPO training
objective:
  rank:
  - min(eval/full/outcome/reason/serve_stall/rate)
  - max(eval/full/episode/return/mean)
  - max(eval/full/episode/return/best)
  - min(leader/checkpoint/step)
train:
  # This goal is training-only: run to the timestep cap without checkpoint evaluation or
  # evaluation-driven stopping. Saved checkpoints remain available for later manual use.
  checkpoint_eval_backend: none
  stop_on_acceptance: false
  checkpoint_freq: 500000
  environment:
    env_provider: &atari_env_provider stable-retro-turbo
    env_config:
      <<: &atari_breakout_env_config
        game: Breakout-Atari2600-v0
        state: Start
        n_envs: 16
        env_args: &atari_breakout_provider_args
          scenario: scenario
          info: data
          use_restricted_actions: filtered
          record: false
          players: 1
          inttype: stable
          obs_type: image
          render_mode: rgb_array
          info_filter: all
          num_threads: 6
          rom_path: null
          obs_copy: safe_view
          obs_grayscale: true
          obs_layout: chw
          frame_stack: 4
          noop_reset_max: 0
          # Keep the learner reward identical to the native replica's Atari score delta.
          reward_clip: false
          use_fire_reset: false
    preprocessing: &atari_breakout_preprocessing
      frame_skip: 4
      # breakout-turbo-env 0.3.0 exposes the matched Atari policy path without max-pooling.
      max_pool_frames: false
      sticky_action_prob: 0.0
      observation_size: 84
      # Breakout's score ends at source row 14; the top wall starts at row 17.
      # Mask the score band and separator while preserving the full wall.
      obs_crop:
      - 17
      - 0
      - 0
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
      obs_resize_algorithm: area
    task: &identity_task
      id: identity
      action:
        set: breakout_minimal
        codec:
          type: discrete_lookup
          # Stable Retro Atari order: BUTTON, unused, SELECT, RESET,
          # UP, DOWN, LEFT, RIGHT. Reset-time FIRE is provider-owned.
          values:
          - [0, 0, 0, 0, 0, 0, 0, 0] # NOOP
          - [1, 0, 0, 0, 0, 0, 0, 0] # FIRE
          # Match Breakout Turbo's native policy IDs: 2=RIGHT, 3=LEFT.
          - [0, 0, 0, 0, 0, 0, 0, 1] # RIGHT
          - [0, 0, 0, 0, 0, 0, 1, 0] # LEFT
      signals:
        ball_y: ball_y
      events:
        serve_stall:
          signal: ball_y
          operation: equals_for
          value: 0
          # One policy step is four emulator frames; 256 steps is ~17 seconds.
          steps: 256
      # Preserve the previous 216,000 raw-frame cap at frame_skip=4.
      termination:
        failure:
        - serve_stall
        max_episode_steps: 54000
      reward:
        reward_mode: native
eval:
  # Dormant policy/playback contract only. checkpoint_eval_backend=none prevents execution.
  episodes: 100
  policy:
    stochastic: true
  environment:
    env_provider: *atari_env_provider
    env_config:
      <<: *atari_breakout_env_config
      # Promotion eval remains vectorized; the lane count is part of its reproducible protocol.
      n_envs: 16
      # Training and evaluation both preserve the real Atari score delta.
      env_args:
        <<: *atari_breakout_provider_args
        reward_clip: false
    preprocessing:
      <<: *atari_breakout_preprocessing
      # Keep the top wall (it begins at source row 17) while removing the score.
      obs_crop:
      - 17
      - 0
      - 0
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: *identity_task
