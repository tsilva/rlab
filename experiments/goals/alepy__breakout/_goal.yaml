defaults:
- _self_
goal_id: alepy__breakout
group_id: "{goal_id}"
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
title: Baseline stable-retro Atari Breakout PPO training
objective:
  rank:
  - max(eval/reward/mean)
  - max(eval/best/reward)
  - min(leader/checkpoint/steps_to_completion_goal)
train:
  checkpoint_freq: 500000
  environment:
    env_provider: &atari_env_provider stable-retro-turbo
    env_config:
      <<: &atari_breakout_env_config
        game: Breakout-Atari2600-v0
        n_envs: 16
        env_args:
          num_threads: 4
          max_episode_steps: 216000
          reward_clip: true
    preprocessing:
      frame_skip: 4
      max_pool_frames: true
      sticky_action_prob: 0.25
      observation_size: 84
      obs_crop:
      - 34
      - 0
      - 0
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: &identity_task
      id: identity
      action:
        set: native
      signals: {}
      events: {}
      termination: {}
      reward:
        reward_mode: native
eval:
  environment:
    env_provider: *atari_env_provider
    env_config:
      <<: *atari_breakout_env_config
      max_episodes: 100
    preprocessing:
      obs_crop:
      - 34
      - 0
      - 0
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: *identity_task
