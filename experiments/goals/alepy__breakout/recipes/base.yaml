recipe_id: base
description: >-
  Seed {seed} trains a PPO Breakout policy for 100M steps on stable-retro-turbo's
  RetroVecEnv with the packaged Stella core and Start save state, masking the
  score band while preserving the top wall. The policy uses the standard
  NOOP/FIRE/LEFT/RIGHT discrete lookup and must launch each ball itself. A
  prolonged no-ball serve state ends as a task failure instead of consuming the
  remaining episode budget. The environment contract keeps Atari choices in
  YAML rather than borrowing Mario-specific wrappers or state semantics.
train:
  timesteps: 100000000
  backend:
    id: sb3.ppo
    config:
      n_steps: 128
      batch_size: 256
      n_epochs: 4
      learning_rate: 2.5e-4
      ent_coef: 0.01
      gamma: 0.99
      gae_lambda: 0.95
      clip_range: 0.1
      vf_coef: 0.5
      adam_eps: 1.0e-05
      normalize_advantage: true
logging:
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: CHECKPOINT_BUCKET_URI
