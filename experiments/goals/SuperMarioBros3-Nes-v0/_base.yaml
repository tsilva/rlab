defaults:
- _self_
# Goal id is rendered from the goal directory name.
goal_id: "{goal_id}"
# Super Mario Bros. 3 single-state goals use the goal id as the Stable Retro source state.
template_vars:
  state: "{goal_id}"
# Default reusable group identifier for SMB3 specs under this goal tree.
group_id: "{goal_id}"
# Default queue run name; seed and timestamp are filled when jobs are enqueued.
run_name_template: "{group_id}_{spec_id}_s{seed}_{timestamp}"
# Default W&B tags for queue-backed specs under this goal tree.
tags:
- "goal_id:{goal_id}"
- "spec_id:{spec_id}"
- "env_id:{env_id}"
# Human-readable title; helps reports and operators identify the goal quickly.
title: Sample-efficient SuperMarioBros3-NES {goal_id} completion
# SMB3 Stable Retro data exposes hpos/lives/score/time, so rank this goal by native eval reward.
objective:
  rank:
  - max(eval/reward/mean)
  - max(eval/reward/max)
# Training contract for this goal.
train:
  checkpoint_freq: 500000
  environment:
    # Stable Retro Turbo supplies the stable_retro runtime import.
    env_provider: &smb3_env_provider stable-retro-turbo
    env_config:
      <<: &smb3_env_config
        # Stable Retro game id passed to RetroVecEnv.
        game: SuperMarioBros3-Nes-v0
        num_envs: 16
        num_threads: 4
        # Emulator frame skip; fixes action repeat and observation cadence.
        frame_skip: 4
        # Number of preprocessed frames stacked in the returned observation.
        frame_stack: 4
        # Crop the 32px bottom status panel from the 224px Stable Retro frame.
        obs_crop:
        - 0
        - 0
        - 32
        - 0
        # Resize target for native preprocessing as [width, height].
        obs_resize:
        - 84
        - 84
        # Convert RGB observations to grayscale natively.
        obs_grayscale: true
        # Resize kernel; area downsampling is the expected image resizer for this contract.
        obs_resize_algorithm: area
        # Tensor layout expected by SB3 CNN policies.
        obs_layout: chw
        # Observation ownership mode; safe_view avoids unnecessary memory traffic.
        obs_copy: safe_view
        # Disable random no-op starts for reproducible goal attempts.
        noop_reset_max: 0
        # Default SMB3 reward shaping contract, mirroring the SMB1 score/progress/death
        # shaping while reading SMB3's native hpos/lives/score info variables.
        env_wrappers:
        - id: SuperMarioBros3NesProgressInfoWrapper
        - id: SuperMarioBros3NesRewardEnvWrapper
          kwargs:
            use_retro_reward: false
            reward_mode: score
            progress_reward_scale: 1.0
            terminal_reward: 50
            death_penalty: 25
            completion_reward: 0.0
            reward_scale: 10
            score_progress_clipped: false
        action_set: native
      # Stable Retro state id; single-state SMB3 goals use the goal id as the source state.
      state: "{state}"
      # Training attempts terminate on death or level clear.
      done_on:
      - life_loss
      - level_change
# Goal-owned checkpoint eval protocol.
eval:
  environment:
    # Stable Retro Turbo supplies the stable_retro runtime import.
    env_provider: *smb3_env_provider
    env_config:
      <<: *smb3_env_config
      max_episodes: 100
      # Eval episodes stop on observed level changes, not life loss.
      done_on:
      - level_change
# Goal-level release target; winner identity is resolved from `rlab leaders checkpoints`.
release:
  huggingface:
    repo: "{env_id}_{goal_id}"
    card_template: stable-retro-sb3
    checkpoint_filename: model.zip
    preview_filename: replay.mp4
    include_youtube_preview: true
