# Reusable Stable Retro Turbo Super Mario Bros. 3 environment fragment.
# Environment provider id; stable-retro-turbo supplies the stable_retro runtime import.
env_provider: stable-retro-turbo
env_config:
  # Stable Retro game id passed to RetroVecEnv.
  game: SuperMarioBros3-Nes-v0
  num_envs: 16
  num_threads: 4
  # Emulator frame skip; fixes action repeat and observation cadence.
  frame_skip: 4
  # Number of preprocessed frames stacked in the returned observation.
  frame_stack: 4
  # Preserve the full frame because the SMB3 Stable Retro scenario does not define a HUD crop.
  obs_crop:
  - 0
  - 0
  - 0
  - 0
  # Resize target for native preprocessing as [width, height].
  obs_resize:
  - 84
  - 84
  # Convert RGB observations to grayscale natively.
  obs_grayscale: true
  # Resize kernel; area downsampling is the expected image resizer for this contract.
  obs_resize_algorithm: area
  # Tensor layout expected by SB3 CNN policies.
  obs_layout: chw
  # Observation ownership mode; safe_view avoids unnecessary memory traffic.
  obs_copy: safe_view
  # Disable random no-op starts for reproducible goal attempts.
  noop_reset_max: 0
  # Default SMB3 reward shaping contract, mirroring the SMB1 score/progress/death
  # shaping while reading SMB3's native hpos/lives/score info variables.
  env_wrappers:
  - id: SuperMarioBros3NesProgressInfoWrapper
  - id: SuperMarioBros3NesRewardEnvWrapper
    kwargs:
      use_retro_reward: false
      reward_mode: score
      progress_reward_scale: 1.0
      terminal_reward: 50
      death_penalty: 25
      completion_reward: 0.0
      reward_scale: 10
      score_progress_clipped: false
  action_set: native
