defaults:
- ../_goal@goal
- _self_
spec_id: base
template_vars:
  recipe: score
  schedule: lrdecay
description: >-
  Seed {seed} trains an SMB1-style score/progress/death shaped baseline for {goal_id}, using
  the stable-retro-turbo provider and SMB3 hpos/lives/score info variables as the source of truth.
train:
  policy:
    # Queue-backed training caps must be explicit in specs; no runtime default is supplied.
    timesteps: 5000000
    # Keeps PyTorch CPU work from competing with the native vector env threads on the GPU host.
    torch_num_threads: 1
    # Uses moderately long PPO rollouts so each update sees enough full attempts to learn stable progress.
    n_steps: 512
    # Matches the rollout chunk size, giving full-batch PPO updates that reduce minibatch noise.
    batch_size: 512
    # Reuses each rollout enough to extract signal from shaped hpos/score progress without overfitting one pass.
    n_epochs: 10
    # Starts with a conservative PPO learning rate for this first SMB3 baseline.
    learning_rate: 1.5e-4
    # Decays to a smaller late learning rate so the policy can consolidate near-clear behavior.
    learning_rate_final: 1.0e-4
    # Spreads the learning-rate decay over most of the 5M cap.
    learning_rate_schedule_timesteps: 4000000
    # Encourages early action diversity on the native NES action space.
    ent_coef: 0.01
    # Lowers entropy pressure late so successful trajectories can become repeatable.
    ent_coef_final: 1.0e-4
    # Decays exploration on the same long horizon as learning rate.
    ent_coef_schedule_timesteps: 4000000
    # Discounts fairly aggressively so PPO emphasizes near-term survival/progress signals.
    gamma: 0.9
    # Uses undiscounted GAE accumulation on top of the lower gamma.
    gae_lambda: 1.0
    # Tightens PPO clipping to limit destructive policy jumps while still allowing improvement.
    clip_range: 0.15
    # Stops overly large PPO updates before they erase useful behavior.
    target_kl: 0.16
    # Gives the critic enough weight to stabilize advantage estimates across native reward scales.
    vf_coef: 1.0
    # Keeps Adam's numerical stabilizer at the standard small value.
    adam_eps: 1.0e-08
    # Preserves raw advantage scale, which can carry useful progress/death-signal strength.
    normalize_advantage: false
logging:
  # Queue-backed logging choices are explicit spec inputs, not runtime defaults.
  wandb: true
  wandb_mode: online
  wandb_artifact_storage_uri: CHECKPOINT_BUCKET_URI
