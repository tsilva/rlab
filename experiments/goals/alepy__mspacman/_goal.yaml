defaults:
- _self_
goal_id: alepy__mspacman
group_id: "{goal_id}"
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
title: Baseline stable-retro Atari Ms. Pac-Man PPO training
objective:
  rank:
  - max(eval/reward/mean)
  - max(eval/best/reward)
  - min(leader/checkpoint/steps_to_completion_goal)
train:
  checkpoint_freq: 500000
  environment:
    env_provider: &atari_env_provider stable-retro-turbo
    env_config:
      <<: &atari_mspacman_env_config
        game: MsPacman-Atari2600-v0
        n_envs: 16
        env_args:
          num_threads: 4
          max_episode_steps: 216000
          reward_clip: true
    preprocessing:
      frame_skip: 4
      max_pool_frames: true
      sticky_action_prob: 0.25
      observation_size: 84
      # ALE native 84x84 preprocessing leaves the bottom HUD in rows 69-83.
      # The raw-coordinate bottom mask below scales to 15 policy rows.
      obs_crop:
      - 0
      - 0
      - 37
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: &identity_task
      id: identity
      action:
        set: native
      signals: {}
      events: {}
      termination: {}
      reward:
        reward_mode: native
eval:
  episodes: 100
  environment:
    env_provider: *atari_env_provider
    env_config:
      <<: *atari_mspacman_env_config
    preprocessing:
      # ALE native 84x84 preprocessing leaves the bottom HUD in rows 69-83.
      # The raw-coordinate bottom mask below scales to 15 policy rows.
      obs_crop:
      - 0
      - 0
      - 37
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: *identity_task
