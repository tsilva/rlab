defaults:
- _self_
goal_id: alepy__mspacman
group_id: "{goal_id}"
run_name_template: "{group_id}_{recipe_id}_s{seed}_{timestamp}"
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
title: Baseline ALE Ms. Pac-Man PPO training
objective:
  rank:
  - max(eval/reward/mean)
  - max(eval/best/reward)
  - min(leader/checkpoint/steps_to_completion_goal)
train:
  checkpoint_freq: 500000
  environment:
    env_provider: &atari_env_provider ale-py
    env_config:
      <<: &atari_mspacman_env_config
        env_args:
          game: ms_pacman
          num_envs: 16
          num_threads: 4
          max_num_frames_per_episode: 216000
          repeat_action_probability: 0.25
          img_height: 84
          img_width: 84
          grayscale: true
          stack_num: 4
          frameskip: 4
          maxpool: true
          reward_clipping: true
    preprocessing:
      # ALE native 84x84 preprocessing leaves the bottom HUD in rows 69-83.
      # The raw-coordinate bottom mask below scales to 15 policy rows.
      obs_crop:
      - 0
      - 0
      - 37
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: &identity_task
      id: identity
      action:
        set: native
      signals: {}
      events: {}
      termination: {}
      reward:
        reward_mode: native
eval:
  environment:
    env_provider: *atari_env_provider
    env_config:
      <<: *atari_mspacman_env_config
      max_episodes: 100
    preprocessing:
      # ALE native 84x84 preprocessing leaves the bottom HUD in rows 69-83.
      # The raw-coordinate bottom mask below scales to 15 policy rows.
      obs_crop:
      - 0
      - 0
      - 37
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: *identity_task
