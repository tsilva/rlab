defaults:
- _self_
goal_id: alepy__mspacman
group_id: "{goal_id}"
tags:
- "goal_id:{goal_id}"
- "recipe_id:{recipe_id}"
- "env_id:{env_id}"
title: Baseline stable-retro Atari Ms. Pac-Man PPO training
objective:
  rank:
  - max(eval/full/reward/mean)
  - max(eval/full/best/reward)
  - min(leader/checkpoint/steps_to_completion_goal)
train:
  checkpoint_freq: 500000
  environment:
    env_provider: &atari_env_provider stable-retro-turbo
    env_config:
      <<: &atari_mspacman_env_config
        game: MsPacman-Atari2600-v0
        state: Start
        n_envs: 16
        env_args:
          scenario: scenario
          info: data
          use_restricted_actions: filtered
          record: false
          players: 1
          inttype: stable
          obs_type: image
          render_mode: rgb_array
          num_threads: 4
          rom_path: null
          obs_copy: safe_view
          obs_grayscale: true
          obs_layout: chw
          frame_stack: 4
          noop_reset_max: 0
          info_filter: all
          reward_clip: true
          use_fire_reset: false
          done_on: null
          autoreset_mode: disabled
    preprocessing: &atari_mspacman_preprocessing
      frame_skip: 4
      max_pool_frames: true
      sticky_action_prob: 0.25
      observation_size: 84
      # ALE native 84x84 preprocessing leaves the bottom HUD in rows 69-83.
      # The raw-coordinate bottom mask below scales to 15 policy rows.
      obs_crop:
      - 0
      - 0
      - 37
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
      obs_resize_algorithm: area
    task: &identity_task
      id: identity
      action:
        set: native
      signals: {}
      events: {}
      # Preserve the previous 216,000 raw-frame cap at frame_skip=4.
      termination:
        max_episode_steps: 54000
      reward:
        reward_mode: native
eval:
  episodes: 100
  environment:
    env_provider: *atari_env_provider
    env_config:
      <<: *atari_mspacman_env_config
      # Promotion eval remains vectorized; the lane count is part of its reproducible protocol.
      n_envs: 16
    preprocessing:
      <<: *atari_mspacman_preprocessing
      # ALE native 84x84 preprocessing leaves the bottom HUD in rows 69-83.
      # The raw-coordinate bottom mask below scales to 15 policy rows.
      obs_crop:
      - 0
      - 0
      - 37
      - 0
      obs_crop_mode: mask
      obs_crop_fill: 0
    task: *identity_task
