defaults:
- ../../../recipes/_presets/atari-ppo@_global_
- _self_
recipe_id: ppo-stable-updates
description: >-
  Seed {seed} trains {goal_id} with the standard Atari PPO batch shape while decaying the
  learning rate and stopping update epochs early when approximate KL becomes too large.
train:
  backend:
    id: sb3.ppo
    config:
      learning_rate: 2.5e-4
      learning_rate_final: 2.5e-5
      learning_rate_schedule_timesteps: 100000000
      target_kl: 0.03
