# Contract schema version; lets validators evolve the goal format deliberately.
schema_version: 1
# Lifecycle state of the shared contract; active means goal overlays may inherit it.
status: active
# Objective fields define what training is trying to optimize, independent of launch mechanics.
objective:
  # Main training metric for ranking goals; min/last is the bottleneck clear rate.
  primary_metric: train/info/level_complete/rate/min/last
  # How to summarize the primary metric over a run; peak rewards learning progress even if later unstable.
  primary_metric_aggregation: peak_over_training_run
  # Companion bottleneck metric; guards against one source level hiding another source level's failure.
  balance_guard_metric: train/info/level_complete/rate/min/last
  # Required rolling completion threshold; 1.0 means every attempt in the window must clear.
  success_threshold: 1.0
  # Window size for success; 100 attempts makes the metric strict and comparable across seeds.
  success_window_attempts: 100
# Environment identity captures the MDP interface the policy acts in; it is hashed for exact comparisons.
environment:
  # Default training budget ceiling; bounds comparisons and avoids open-ended searches.
  max_train_timesteps: 5000000
  # Fully-qualified environment id; resolved through the rlab environment registry.
  env_id: stable-retro-turbo:SuperMarioBros-Nes-v0
  # Action-space configuration; determines which controller buttons the policy can emit.
  action:
    # Named action set from the target; simple keeps the Mario policy action space small and comparable.
    action_set: simple
  # Observation preprocessing; defines exactly what pixels/tensors the policy sees.
  preprocessing:
    # Preprocessing implementation path; distinguishes native vector observations from wrapper stacks.
    pipeline: stable_retro_native_vec_env
    # Emulator frame skip; fixes action repeat and observation cadence.
    frame_skip: 4
    # Number of frames in the policy observation stack; preserves motion information.
    frame_stack: 4
    # Whether to max-pool adjacent frames; false matches the current native-vector Mario contract.
    max_pool_frames: false
    # Random sticky action probability; 0 disables stochastic action repetition for this contract.
    sticky_action_prob: 0.0
    # Resize target as [height, width]; canonical identity field for policy input resolution.
    obs_resize:
    - 84
    - 84
    # Crop as [top, right, bottom, left]; removes the HUD while staying provider-agnostic.
    obs_crop:
    - 32
    - 0
    - 0
    - 0
    # Whether observations are grayscale; fixes channel semantics before frame stacking.
    obs_grayscale: true
    # Resize kernel; area downsampling is the expected image resizer for this contract.
    obs_resize_algorithm: area
    # Observation buffer ownership mode; safe_view avoids unnecessary memory traffic.
    obs_copy: safe_view
    # Tensor layout expected by the policy; channel_first matches SB3 CNN inputs.
    policy_observation_layout: channel_first
  # Episode termination semantics; defines what counts as an attempt boundary.
  termination:
    # Hard per-episode cap; prevents stuck runs from consuming unbounded rollout time.
    max_episode_steps: 4500
    # X-position threshold for completion logic; 0 means rely on configured info events here.
    completion_x_threshold: 0
    # Info-event extraction rules; converts emulator info changes into named events.
    info_events_json:
      # Life-loss event source; used to end attempts on death.
      life_loss:
      - lives
      - decrease
      # Level-change event source; used as the clear/completion boundary.
      level_change:
      - - levelHi
        - levelLo
      - change
    # Events that terminate an attempt; fixes the denominator for rolling completion metrics.
    done_on_events:
    - life_loss
    - level_change
# Goal-owned checkpoint eval protocol.
eval_spec:
  schema_version: 1
  eval_config:
    episodes: 100
    seed: 10007
    n_envs: 20
    max_steps: 4500
    stochastic: true
    done_on_events:
    - level_change
