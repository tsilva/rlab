<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rlab player</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script type="module" src="/assets/app.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="app-brand">
        <span class="eyebrow">RLAB PLAYER</span>
        <span class="header-divider" aria-hidden="true"></span>
        <h1 id="page-title">Mario debug</h1>
      </div>
      <div class="workspace-status" aria-live="polite">
        <span id="connection-status" class="sync-status warning">Connecting</span>
      </div>
      <div class="header-status">
        <button id="layouts-toggle" class="quiet icon-only" type="button" aria-label="Layouts" title="Layouts"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-layout-dashboard"></use></svg></button>
        <button id="panels-toggle" class="quiet icon-only" type="button" aria-label="Panels" title="Panels" aria-controls="panel-shelf" aria-expanded="false"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-layout-grid"></use></svg></button>
        <button id="new-window" class="quiet icon-only" type="button" aria-label="Open synchronized window" title="Open synchronized window"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-external-link"></use></svg></button>
        <span id="control-status" class="badge muted">Observer</span>
      </div>
    </header>

    <div id="layout-menu" class="floating-menu layout-menu" hidden>
      <label>Layout name <input id="layout-name-input" value="Mario debug" maxlength="48"></label>
      <div class="menu-actions">
        <button id="save-layout" class="primary button-with-icon" type="button"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-device-floppy"></use></svg><span>Save layout</span></button>
        <button id="reset-layout" class="quiet button-with-icon" type="button"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-restore"></use></svg><span>Reset default</span></button>
      </div>
      <div id="saved-layouts" class="saved-layouts"></div>
    </div>

    <div id="panel-menu" class="floating-menu panel-menu" hidden>
      <strong id="panel-menu-title">Panel</strong>
      <button id="panel-new-window" class="button-with-icon" type="button"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-external-link"></use></svg><span>Move to new window</span></button>
      <button id="panel-dock-main" class="button-with-icon" type="button"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-layout-dashboard"></use></svg><span>Dock to main window</span></button>
      <button id="panel-hide" class="button-with-icon" type="button"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-eye-off"></use></svg><span>Hide panel</span></button>
      <button id="panel-reset-size" class="button-with-icon" type="button"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-restore"></use></svg><span>Reset size</span></button>
    </div>

    <div id="panel-shelf" class="floating-menu panel-shelf" hidden aria-label="Available panels">
      <strong>Available panels</strong>
      <div id="panel-shelf-items" class="panel-shelf-items"></div>
    </div>

    <main id="dashboard" class="dashboard"></main>

    <section id="timeline" class="timeline" aria-label="Bounded trajectory inspection">
      <div class="timeline-labels">
        <strong id="timeline-step">STEP —</strong>
        <span id="timeline-sequence">SEQ —</span>
        <button id="return-live" class="quiet icon-only" type="button" aria-label="Return to live playback" title="Return to live playback" hidden><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-player-play"></use></svg></button>
      </div>
      <div class="timeline-track">
        <input id="timeline-scrubber" type="range" min="0" max="0" value="0" aria-label="Inspect a retained transition">
        <div id="timeline-markers" class="timeline-markers" aria-hidden="true"></div>
      </div>
      <div class="timeline-zoom" aria-label="Timeline scale">
        <button id="timeline-zoom-out" class="quiet icon-only" type="button" aria-label="Zoom timeline out" title="Zoom timeline out"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-zoom-out"></use></svg></button>
        <span id="timeline-zoom-label">512 steps</span>
        <button id="timeline-zoom-in" class="quiet icon-only" type="button" aria-label="Zoom timeline in" title="Zoom timeline in"><svg class="icon" aria-hidden="true"><use href="/assets/tabler-icons.svg#ti-zoom-in"></use></svg></button>
      </div>
    </section>

    <div id="drop-preview" class="drop-preview" hidden aria-hidden="true"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
