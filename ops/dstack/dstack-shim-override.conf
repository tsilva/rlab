[Service]
# dstack 0.20.28 probes /dev/kfd before /dev/nvidiactl. B3's Ryzen iGPU
# exposes /dev/kfd and otherwise masks the RTX 4090 as an AMD accelerator.
# rlab does not schedule AMD compute on B3, so remove only that compute node
# before each probe and force the immutable host inventory to be regenerated.
ExecStartPre=-/usr/bin/rm -f /dev/kfd
ExecStartPre=-/usr/bin/rm -f /root/.dstack/host_info.json
