resources:
  cpu: 1..
  memory: 1GB..
  gpu: 1
  disk: 10GB..
fleets:
  - b3
creation_policy: reuse
max_duration: 5m
stop_duration: 1m
retry:
  on_events:
    - no-capacity
    - interruption
  duration: 10m
tags:
  managed-by: rlab
  purpose: b3-smoke
