type: task
name: rlab-b3-smoke
image: nvidia/cuda@sha256:cfab6d524036220368d0665013dd79ddc8cd3516298dc12f031de62c8481f87e
commands:
  - >-
    nvidia-smi
    --query-gpu=name,memory.total
    --format=csv,noheader
